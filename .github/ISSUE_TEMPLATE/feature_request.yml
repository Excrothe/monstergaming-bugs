name: Feature Request
description: Suggest a feature for Monster Gaming
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've thought about
  - type: dropdown
    id: area
    attributes:
      label: Platform Area
      options:
        - API / Gateway
        - Game Engine Integration
        - Asset Pipeline
        - VFX / Rendering
        - Fleet / Agents
        - Web UI
        - CLI / SDK
        - Other

name: Bug Report
description: Report a bug in the Monster Gaming platform
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical (crash, data loss)
        - High (feature broken, no workaround)
        - Medium (feature broken, workaround exists)
        - Low (cosmetic, minor)
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Platform Area
      options:
        - API / Gateway
        - Game Engine Integration
        - Asset Pipeline
        - VFX / Rendering
        - Fleet / Agents
        - Web UI
        - CLI / SDK
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, engine version, etc.
      placeholder: "macOS 15.1, Chrome 131, Unreal 5.5"
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Any relevant logs, error messages, or screenshots
